- name: Deploy application
  run: |
    ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
    docker pull linsuijian/travel-bot:latest
    docker stop travel-bot || true
    docker rm travel-bot || true
    docker run -d --name travel-bot \
      -v /opt/travel-bot/config.ini:/app/config.ini \
      -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
      -p 8080:8080 \
      --restart unless-stopped \
      linsuijian/travel-bot:latest
    EOF